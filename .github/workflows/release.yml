name: Build and Release GUI Clients

on:
  push:
    tags:
      - 'v*' # Trigger build on version tags, e.g. v1.0.0

permissions:
  contents: write

jobs:
  build-desktop:
    name: Build Windows Desktop Client
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Root Dependencies
        run: npm ci

      - name: Install Client Dependencies
        run: |
          cd client
          npm ci

      - name: Build Vite Client Assets
        run: |
          cd client
          npm run build

      - name: Package Windows EXE
        run: npm run desktop:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows Asset Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-studio-exe
          path: dist-desktop/*.exe

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Root Dependencies
        run: npm ci

      - name: Install Client Dependencies
        run: |
          cd client
          npm ci

      - name: Build Vite Client Assets
        run: |
          cd client
          npm run build

      - name: Sync Capacitor Android
        run: |
          cd client
          npx cap sync android

      - name: Build Debug APK
        run: |
          cd client/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Android Asset Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-controller-apk
          path: client/android/app/build/outputs/apk/debug/app-debug.apk

  create-release:
    name: Create GitHub Release
    needs: [build-desktop, build-android]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-studio-exe
          path: dist-release/

      - name: Download Android Artifact
        uses: actions/download-artifact@v4
        with:
          name: android-controller-apk
          path: dist-release/

      - name: Rename Artifacts for Release
        run: |
          mv dist-release/*.exe dist-release/YouTube-Shorts-Studio.exe
          mv dist-release/*.apk dist-release/YouTube-Shorts-Controller.apk

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist-release/YouTube-Shorts-Studio.exe
            dist-release/YouTube-Shorts-Controller.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
